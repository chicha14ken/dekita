<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1B3A2D" />
  <meta name="description" content="AIが、あなたの「できた」の証人になる。" />
  <title>Dekita — できた</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta property="og:title" content="Dekita — できた">
  <meta property="og:description" content="AIが、あなたの「できた」の証人になる。">
  <meta property="og:image" content="https://dekita-nine.vercel.app/ogp.png">
  <meta property="og:url" content="https://dekita-nine.vercel.app">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dekita — できた">
  <meta name="twitter:description" content="AIが、あなたの「できた」の証人になる。">
  <meta name="twitter:image" content="https://dekita-nine.vercel.app/ogp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@900&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script defer src="/_vercel/insights/script.js"></script>
  <script type="module" src="/firebase-auth.js"></script>
</head>
<body>

  <div class="app-shell">

    <!-- ヘッダー -->
    <header class="app-header">
      <span class="app-logo">Dekita</span>
      <div class="header-tabs">
        <button class="tab-btn active" id="tabChat" onclick="switchTab('chat')">話す</button>
        <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">履歴</button>
      </div>
      <div id="authBar" class="auth-bar">
        <div id="authGuest" class="auth-guest">
          <button class="auth-login-btn" id="loginBtn" onclick="handleGoogleLogin()">ログイン</button>
        </div>
        <div id="authUser" class="auth-user" style="display:none;">
          <img class="auth-avatar" id="authAvatar" src="" alt="" width="24" height="24" />
          <button class="auth-logout-btn" id="logoutBtn" onclick="handleLogout()">ログアウト</button>
        </div>
      </div>
    </header>

    <!-- 話すビュー -->
    <div class="view" id="viewChat">
      <div class="chat-history" id="chatHistory"></div>
      <div class="chat-input-area" id="chatInputArea">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="できたことを話してみて"
          rows="1"
          maxlength="300"
        ></textarea>
        <button class="chat-send-btn" id="chatSendBtn" onclick="sendChat()" aria-label="送信">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 13V3M8 3L4 7M8 3L12 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 履歴ビュー -->
    <div class="view hidden" id="viewHistory">
      <div class="history-list" id="historyList"></div>
    </div>

  </div>

  <!-- フィードバック（フローティング） -->
  <div id="feedbackArea" style="display:none;">
    <p class="feedback-label">メッセージ、刺さりましたか？</p>
    <div id="feedbackButtons" class="feedback-buttons">
      <button onclick="selectFeedback('great')">😍</button>
      <button onclick="selectFeedback('ok')">😐</button>
      <button onclick="selectFeedback('miss')">🤔</button>
    </div>
    <div id="feedbackComment" style="display:none;">
      <input type="text" id="feedbackText" placeholder="よかったらもう少し教えてください（任意）" />
      <button onclick="submitFeedback()" class="feedback-submit">送る</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
