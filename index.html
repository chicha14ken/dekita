<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1B3A2D" />
  <meta name="description" content="AIが、あなたの努力を見届ける。身体的な挑戦の証人になります。" />
  <title>Dekita — できた</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta property="og:title" content="Dekita — できた">
  <meta property="og:description" content="AIが、あなたの努力を見届ける。身体的な挑戦の証人になります。">
  <meta property="og:image" content="https://dekita-nine.vercel.app/ogp.png">
  <meta property="og:url" content="https://dekita-nine.vercel.app">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dekita — できた">
  <meta name="twitter:description" content="AIが、あなたの努力を見届ける。身体的な挑戦の証人になります。">
  <meta name="twitter:image" content="https://dekita-nine.vercel.app/ogp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@900&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app">
    <main class="app-main">
      <div class="input-group">
        <label class="input-label" for="intention">today's challenge</label>
        <input
          id="intention"
          class="intention-input"
          type="text"
          placeholder="例：3km走る、腕立て20回..."
          autocomplete="off"
          maxlength="100"
        />
      </div>

      <div class="button-wrap">
        <button class="yatta-btn" id="yattaBtn" onclick="fireYatta()" aria-label="やった！ボタン">
          <span class="yatta-text">できた</span>
          <span class="ripple" id="ripple"></span>
        </button>
      </div>

      <div class="message-area" id="messageArea" aria-live="polite">
        <p class="message-main" id="messageMain"></p>
        <p class="message-sub" id="messageSub"></p>
      </div>

      <div id="feedbackArea" style="display:none; text-align:center; margin-top:1.5rem;">
        <p style="font-size:12px; color:#888; margin-bottom:10px;">
          メッセージ、刺さりましたか？
        </p>
        <div id="feedbackButtons" style="display:flex; justify-content:center; gap:12px; margin-bottom:12px;">
          <button onclick="selectFeedback('great')"
            style="font-size:20px; background:none; border:0.5px solid #ccc;
                   border-radius:50%; width:44px; height:44px; cursor:pointer;">
            😍
          </button>
          <button onclick="selectFeedback('ok')"
            style="font-size:20px; background:none; border:0.5px solid #ccc;
                   border-radius:50%; width:44px; height:44px; cursor:pointer;">
            😐
          </button>
          <button onclick="selectFeedback('miss')"
            style="font-size:20px; background:none; border:0.5px solid #ccc;
                   border-radius:50%; width:44px; height:44px; cursor:pointer;">
            🤔
          </button>
        </div>
        <div id="feedbackComment" style="display:none; padding:0 1rem;">
          <input type="text" id="feedbackText"
            placeholder="よかったらもう少し教えてください（任意）"
            style="width:100%; font-size:13px; padding:8px;
                   border:0.5px solid #ccc; border-radius:4px; margin-bottom:8px; box-sizing:border-box;">
          <button onclick="submitFeedback()"
            style="font-size:12px; color:#888; background:none;
                   border:0.5px solid #ccc; padding:6px 16px;
                   border-radius:4px; cursor:pointer;">
            送る
          </button>
        </div>
      </div>

      <hr class="divider" id="divider" />

      <section class="timeline" id="timeline" aria-label="履歴">
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
